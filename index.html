var LABS=["Grupo","E1","E2","E3","E4","E5","E6","E7"];
var nav=document.getElementById("nav");
KEYS.forEach(function(k,i){var b=document.createElement("button");b.className="nb";b.textContent=LABS[i];b.dataset.key=k;b.onclick=function(){render(k);};nav.appendChild(b);});
render("grupo");
</script>
